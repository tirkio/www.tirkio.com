<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<link rel="icon" href="{{ site.baseurl }}/{{site.favicon}}">

<title>{{ page.title }} | {{site.title}}</title>

{% seo %}

<link href="{{ site.baseurl }}/assets/css/theme.css" rel="stylesheet">

<!-- custom CSS -->
<link href="{{ site.baseurl }}/assets/css/custom.css" rel="stylesheet">
</head>

<body class="{{ page.layout | default: '' }}">

<!-- Header Navigation -->
<div class="navigation-wrap start-header start-style">
    <nav class="navbar navbar-expand-lg">
        <div class="container d-flex justify-content-between">
          
          <!-- Logo -->
          <a class="navbar-brand text-dark font-weight-bold big d-flex align-items-center" href="{{site.baseurl}}/">
            <span class="d-none d-md-inline-block">{{ site.title }}</span>
          </a>

          <!-- Navigation Menu -->
          <div class="collapse navbar-collapse justify-content-end" id="navbarResponsive">
            <ul class="navbar-nav ml-auto font-weight-bold">
              {% for category in site.categories %}
                <li class="nav-item">
                  <a class="nav-link px-3" href="{{ site.baseurl }}/categories#{{ category[0] | slugify }}" alt="Category: {{ category[0] }}">
                    {{ category[0] | capitalize }}
                  </a>
                </li>
              {% endfor %}
            </ul>
          </div>

          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
            <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" fill="currentColor" class="bi bi-three-dots-vertical" viewBox="0 0 16 16">
              <path d="M9.5 13a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm0-5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm0-5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0z"/>
            </svg>
          </button>
        </div>
      </nav>
</div>  

<!-- Main Content -->
<main class="container">
  {{ content }}
</main>

<!-- Footer -->
<footer class="footer container text-center">  
  <ul class="p-0 mb-1 small">
    {% for page in site.pages %}
      {% if page.title and page.permalink %}
        <li>
          <a href="{{ site.baseurl }}{{ page.permalink }}" alt="{{ page.title }}">
            {{ page.title }}
          </a>
        </li>
      {% endif %}
    {% endfor %}
  </ul>
</footer>

<script src="{{ site.baseurl }}/assets/js/jquery.min.js"></script>   
<script src="{{ site.baseurl }}/assets/js/theme.js"></script>    
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

</body>
</html>
